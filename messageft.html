<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat — UMak Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="umaklogo.png">
    <style>
        .chat-container {
            display: flex; flex-direction: column;
            height: calc(100dvh - 220px);
            height: calc(100vh - 220px);
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: var(--radius-xl); overflow: hidden; margin-top: 20px;
        }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 0.9rem; position: relative; animation: popIn 0.25s ease; word-wrap: break-word; }
        .bubble.mine { align-self: flex-end; background: linear-gradient(135deg, var(--iac-bright), var(--iac-blue)); color: white; border-bottom-right-radius: 4px; }
        .bubble.theirs { align-self: flex-start; background: var(--bg-raised); border: 1px solid var(--border); border-bottom-left-radius: 4px; color: var(--text-primary); }
        .bubble::after { content: attr(data-time); display: block; font-size: 0.65rem; margin-top: 4px; opacity: 0.7; text-align: right; }
        .chat-input-area { padding: 16px; border-top: 1px solid var(--border); display: flex; gap: 12px; background: var(--bg-surface); flex-shrink: 0; }
        .dept-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(var(--iac-bright-rgb, 0,122,255), 0.12); color: var(--iac-bright); border: 1px solid rgba(var(--iac-bright-rgb, 0,122,255), 0.25); border-radius: 99px; font-size: 0.72rem; font-family: var(--font-mono); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; padding: 3px 10px; margin-top: 6px; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95) translateY(5px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @media (max-width: 720px) {
            .chat-container { height: calc(100dvh - 180px); height: calc(100vh - 180px); margin-top: 12px; border-radius: var(--radius-lg); }
            .chat-box { padding: 14px; }
            .chat-input-area { padding: 10px 12px; gap: 8px; }
        }
        @media (max-width: 480px) {
            .chat-container { height: calc(100dvh - 150px); height: calc(100vh - 150px); }
            .bubble { max-width: 90%; font-size: 0.85rem; padding: 9px 12px; }
        }
    </style>
</head>
<body class="page" data-page="chat">
    <div id="appSplash" class="app-splash">
    <div class="splash-logo-container">
        <img src="umaklogo.png" alt="UMak Hub Loading" class="splash-logo">
    </div>
</div>
<div class="app-shell">
<div class="layout">

    <!-- Mobile sidebar backdrop overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Mobile header -->
    <div class="mobile-header">
        <div class="brand-panel" style="margin-bottom:0; padding:0;">
            <img src="umaklogo.png" alt="UMak Hub Logo" id="umaklogoMobile">
            <div>
                <p class="brand-title">UMak Hub</p>
                <span class="brand-subtitle" id="chatSubtitleMobile">Direct Message</span>
            </div>
        </div>
        <div style="display:flex; align-items:center; gap:8px;">
            <button id="endChatBtnMobile" class="button danger sm" style="display:none;">
                <i class="ph ph-stop-circle"></i> End
            </button>
            <button class="icon-button" id="mobileMenuBtn" aria-label="Toggle Menu">
                <i class="ph ph-list" id="menuIcon"></i>
            </button>
        </div>
    </div>

    <aside class="sidebar" id="appSidebar">
        <div class="brand-panel">
            <img src="umaklogo.png" alt="UMak Hub Logo" id="umaklogo">
            <div>
                <p class="brand-title">UMak Hub</p>
                <span class="brand-subtitle">Campus Network</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-link" id="backToPortal" href="#">
                <span class="nav-link-icon"><i class="ph ph-caret-left"></i></span> Back to Portal
            </a>
            <div class="nav-divider"></div>
            <div style="padding: 10px; font-size: 0.75rem; color: var(--text-muted); font-family: var(--font-mono);">ACTIVE SESSION</div>
        </nav>
        <div class="sidebar-footer">
            <button class="button secondary fullwidth theme-toggle-btn" style="margin-bottom: 12px;">
                <i class="ph ph-moon theme-icon"></i> <span style="margin-left:5px;">Toggle Theme</span>
            </button>
            <div class="profile-card">
                <div class="profile-info">
                    <div class="profile-avatar" id="memberAvatar">U</div>
                    <div>
                        <p class="profile-name" id="memberName">User</p>
                    </div>
                </div>
                <div style="display:flex; gap:6px;">
                    <a href="profile.html" class="icon-button" aria-label="Edit Profile" title="Edit Profile" style="width: 34px; height: 34px; border-radius: 10px; font-size: 1.1rem;">
                        <i class="ph ph-gear"></i>
                    </a>
                    <button id="logoutBtn" class="logout-icon-btn" aria-label="Sign Out" title="Sign Out">
                        <i class="ph ph-sign-out"></i>
                    </button>
                </div>
            </div>
        </div>
    </aside>

    <div class="content-area">
        <header class="page-header">
            <div>
                <p class="section-label">Direct Message</p>
                <h1 id="chatUserName">Loading...</h1>
                <!-- Department badge — shown for members so they know who they contacted -->
                <div id="chatDeptBadge" class="dept-badge" style="display:none;">
                    <i class="ph ph-buildings"></i>
                    <span id="chatDeptLabel"></span>
                </div>
                <p id="chatUserEmail" class="section-note" style="margin-top:4px;"></p>
            </div>
            <div class="header-actions">
                <button id="endChatBtnDesktop" class="button danger" onclick="document.getElementById('endChatModal').classList.remove('hidden')">
                    <i class="ph ph-stop-circle"></i> End Chat
                </button>
            </div>
        </header>

        <div class="chat-container">
            <div class="chat-box" id="chatBox">
                <div id="typingIndicator" style="padding: 0 5px; font-size: 0.75rem; color: var(--text-secondary); font-style: italic; min-height: 15px;"></div>
            </div>
            <form class="chat-input-area" id="chatForm">
                <input type="text" id="chatMsgInput" placeholder="Type your message..." required autocomplete="off">
                <button type="submit" class="button primary"><i class="ph ph-paper-plane-right"></i></button>
            </form>
        </div>
    </div>
</div>
</div>

<div id="endChatModal" class="modal hidden">
    <div class="modal-backdrop" onclick="closeModal(document.getElementById('endChatModal'))"></div>
    <div class="modal-panel" style="max-width:440px;">
        <div class="modal-header">
            <div><h2>End Conversation</h2><p>Submit a conclusion to archive this chat.</p></div>
        </div>
        <form id="endChatForm">
            <label>Final Conclusion / Summary
                <textarea id="chatConclusion" rows="4" required placeholder="What was the outcome of this chat?"></textarea>
            </label>
            <div class="form-actions" style="margin-top:10px;">
                <button type="submit" class="button primary" style="flex:1;">Confirm & Archive</button>
                <button type="button" onclick="closeModal(document.getElementById('endChatModal'))" class="button secondary">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="script.js"></script>
<script>
const user = getCurrentUser();
if (!user) window.location.href = "login.html";

const isAdmin   = user.role && user.role.toLowerCase() === "admin";
const urlParams = new URLSearchParams(window.location.search);

// ── Read routing params from URL (set by memberpage.html on chat request submit)
// For admins, these come from adminpage.html when they open a member's chat.
// For members, these come from the chat request redirect in memberpage.html.
const urlConvId = urlParams.get('id')   || localStorage.getItem('activeChatId')   || null;
const urlDept   = urlParams.get('dept') || localStorage.getItem('activeChatDept') || null;

// For admin: target is the member passed via URL params
// For member: resolved below via resolveTargetForMember()
let targetEmail = isAdmin ? (urlParams.get('email') || "") : "";
let targetName  = isAdmin ? (urlParams.get('name')  || targetEmail.split('@')[0] || "Student Member") : "Admin";
let activeDept  = isAdmin ? (urlParams.get('dept')  || urlDept || "") : (urlDept || "");
let activeConvId = urlConvId;

// ── resolveTargetForMember ────────────────────────────────────────────────────
// Priority order:
//   1. conversations table row matching urlConvId → assigned admin_email
//   2. Find admin by department from urlDept (users table or conversations)
//   3. Existing messages fallback
//   4. chat_requests approved/resolved fallback
//   5. Any admin (last resort)
async function resolveTargetForMember() {
    if (isAdmin) return; // Admins have target from URL already

    // 1. We have a specific conversation ID — check if an admin is assigned
    if (activeConvId) {
        try {
            const { data: conv } = await supabaseClient
                .from('conversations')
                .select('admin_email, department, status')
                .eq('id', activeConvId)
                .single();

            if (conv) {
                activeDept = conv.department || activeDept;

                if (conv.admin_email) {
                    targetEmail = conv.admin_email;
                    const { data: adminProfile } = await supabaseClient
                        .from('users')
                        .select('name')
                        .eq('email', targetEmail)
                        .single();
                    targetName = adminProfile?.name || activeDept || 'Admin';
                    return;
                }
            }
        } catch (e) { console.warn("Could not load conversation by ID:", e); }
    }

    // 2. Find an admin whose department matches what the user selected
    if (activeDept) {
        try {
            const { data: deptAdmins } = await supabaseClient
                .from('users')
                .select('email, name')
                .eq('role', 'admin')
                .eq('department', activeDept)
                .limit(1);

            if (deptAdmins && deptAdmins.length > 0) {
                targetEmail = deptAdmins[0].email;
                targetName  = deptAdmins[0].name || activeDept;

                // Back-fill admin_email on the conversations row so future
                // page loads skip straight to step 1.
                if (activeConvId) {
                    supabaseClient
                        .from('conversations')
                        .update({ admin_email: targetEmail, status: 'active' })
                        .eq('id', activeConvId)
                        .then(() => {});
                }
                return;
            }
        } catch (e) { console.warn("Could not find admin by department:", e); }
    }

    // 3. Fallback: look in existing messages for a previous conversation partner
    try {
        const { data: msgs } = await supabaseClient
            .from('messages')
            .select('sender_email, receiver_email')
            .or(`sender_email.eq.${user.email},receiver_email.eq.${user.email}`)
            .limit(1);

        if (msgs && msgs.length > 0) {
            const msg = msgs[0];
            targetEmail = msg.sender_email === user.email ? msg.receiver_email : msg.sender_email;
            if (targetEmail) return;
        }
    } catch (e) { console.warn("Message lookup failed:", e); }

    // 4. Fallback: approved/resolved chat_request row
    try {
        const { data: chatReq } = await supabaseClient
            .from('chat_requests')
            .select('admin_email')
            .eq('user_email', user.email)
            .in('status', ['approved', 'resolved'])
            .order('created_at', { ascending: false })
            .limit(1);

        if (chatReq && chatReq.length > 0 && chatReq[0].admin_email) {
            targetEmail = chatReq[0].admin_email;
            return;
        }
    } catch (e) { console.warn("chat_requests lookup failed:", e); }

    // 5. Last resort: any admin
    try {
        const { data: admins } = await supabaseClient
            .from('users')
            .select('email, name')
            .eq('role', 'admin')
            .limit(1);

        if (admins && admins.length > 0) {
            targetEmail = admins[0].email;
            targetName  = admins[0].name || "Admin";
        }
    } catch (e) { console.warn("Admin fallback lookup failed:", e); }
}

// ── Static UI initialization (before async resolution) ────────────────────────
document.getElementById('chatUserName').textContent  = isAdmin ? targetName : (activeDept || "Connecting...");
document.getElementById('chatUserEmail').textContent = isAdmin ? targetEmail : "Connecting to department...";
document.getElementById('backToPortal').href         = isAdmin ? "adminpage.html" : "memberpage.html";

// Show department badge for members
if (!isAdmin && activeDept) {
    document.getElementById('chatDeptBadge').style.display = 'inline-flex';
    document.getElementById('chatDeptLabel').textContent   = activeDept;
}

// Sidebar profile
const memberNameEl   = document.getElementById('memberName');
const memberAvatarEl = document.getElementById('memberAvatar');
if (memberNameEl)   memberNameEl.textContent   = user.name;
if (memberAvatarEl) memberAvatarEl.textContent = (user.name || 'U').slice(0, 2).toUpperCase();

// Logout button
const logoutBtnEl = document.getElementById('logoutBtn');
if (logoutBtnEl) logoutBtnEl.onclick = logout;

// Mobile subtitle
const chatSubtitle = document.getElementById('chatSubtitleMobile');
if (chatSubtitle) chatSubtitle.textContent = activeDept || targetName;

// Mobile End Chat button
const endChatBtnMobile = document.getElementById('endChatBtnMobile');
if (endChatBtnMobile) {
    endChatBtnMobile.style.display = 'inline-flex';
    endChatBtnMobile.onclick = () => document.getElementById('endChatModal').classList.remove('hidden');
}

const chatBox = document.getElementById("chatBox");
let chatChannel;

// ── renderBubble ──────────────────────────────────────────────────────────────
// Uses the actual DB timestamp for history messages so times are correct.
function renderBubble(content, isMe, timestamp) {
    const wrapper = document.createElement("div");
    wrapper.style.cssText = `display:flex; flex-direction:column; align-items:${isMe ? 'flex-end' : 'flex-start'}; margin-bottom:8px;`;

    const senderLabel = document.createElement("span");
    senderLabel.style.cssText = "font-size:0.7rem; color:var(--text-muted); margin-bottom:2px; padding:0 4px;";
    senderLabel.textContent = isMe ? "You" : targetName;

    const div = document.createElement("div");
    div.className = `bubble ${isMe ? 'mine' : 'theirs'}`;
    div.textContent = content;

    const ts = timestamp ? new Date(timestamp) : new Date();
    div.setAttribute('data-time', ts.getHours() + ":" + String(ts.getMinutes()).padStart(2, '0'));

    wrapper.appendChild(senderLabel);
    wrapper.appendChild(div);
    chatBox.insertBefore(wrapper, document.getElementById('typingIndicator'));
    chatBox.scrollTop = chatBox.scrollHeight;
}

// ── initChat ──────────────────────────────────────────────────────────────────
async function initChat() {
    // Update header now that targetName/targetEmail are resolved
    if (!isAdmin) {
        document.getElementById('chatUserName').textContent  = activeDept  || targetName;
        document.getElementById('chatUserEmail').textContent = targetEmail
            ? `Chatting with: ${targetName} (${targetEmail})`
            : targetName;

        // Persist resolved IDs so "Back to Portal → Messages" link works
        if (activeConvId) localStorage.setItem('activeChatId',  activeConvId);
        if (activeDept)   localStorage.setItem('activeChatDept', activeDept);
    }

    // Load message history
    const history = await dbGetMessages(user.email, targetEmail);
    history.forEach(msg => renderBubble(msg.content, msg.sender_email === user.email, msg.created_at));

    // Realtime channel — unique per conversation pair to avoid cross-talk
    const channelName = `chat-${[user.email, targetEmail].sort().join('-')}`;
    chatChannel = supabaseClient.channel(channelName)
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
            // Only render the other person's incoming messages here;
            // our own are already rendered optimistically on submit.
            if (payload.new.sender_email === targetEmail && payload.new.receiver_email === user.email) {
                renderBubble(payload.new.content, false, payload.new.created_at);
            }
        })
        .on('broadcast', { event: 'typing' }, payload => {
            const indicator = document.getElementById('typingIndicator');
            if (payload.payload.email === targetEmail) {
                indicator.textContent = payload.payload.isTyping ? `${targetName} is typing...` : '';
            }
        })
        .subscribe();

    // Send message
    document.getElementById('chatForm').onsubmit = async (e) => {
        e.preventDefault();
        const input   = document.getElementById('chatMsgInput');
        const content = input.value.trim();
        if (!content || !targetEmail) return;
        renderBubble(content, true); // optimistic render
        input.value = "";
        await dbSendMessage(user.email, targetEmail, content);
    };

    // Typing indicator broadcast
    let typingTimeout;
    document.getElementById('chatMsgInput').addEventListener('input', () => {
        chatChannel.send({ type: 'broadcast', event: 'typing', payload: { email: user.email, isTyping: true } });
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            chatChannel.send({ type: 'broadcast', event: 'typing', payload: { email: user.email, isTyping: false } });
        }, 2000);
    });
}

// ── End Chat ──────────────────────────────────────────────────────────────────
document.getElementById('endChatForm').onsubmit = async (e) => {
    e.preventDefault();
    const submitBtn = e.target.querySelector('button[type="submit"]');
    if (submitBtn) { submitBtn.disabled = true; submitBtn.innerHTML = '<i class="ph ph-circle-notch"></i> Archiving...'; }

    const conclusion = document.getElementById('chatConclusion').value;
    const history    = await dbGetMessages(user.email, targetEmail);
    const now        = new Date();

    const archiveData = {
        user_email   : isAdmin ? targetEmail : user.email,
        admin_email  : isAdmin ? user.email  : targetEmail,
        action_type  : "Concluded Chat",
        meeting_date : now.toLocaleDateString(),
        meeting_time : now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
        location     : "Virtual Chat Hub",
        chat_history : history,
        conclusion   : conclusion,
        department   : activeDept || null,
    };

    try {
        const { error: insertError } = await supabaseClient.from('resolutions').insert([archiveData]);
        if (insertError) throw insertError;

        await dbDeleteMessages(user.email, targetEmail);

        // Mark the conversations row as resolved (if we have its ID)
        if (activeConvId) {
            await supabaseClient.from('conversations').update({ status: 'resolved' }).eq('id', activeConvId);
        }

        // Also mark legacy chat_requests row if one exists
        await supabaseClient.from('chat_requests')
            .update({ status: 'resolved' })
            .eq('user_email', isAdmin ? targetEmail : user.email);

        // Clear localStorage routing keys
        localStorage.removeItem('activeChatId');
        localStorage.removeItem('activeChatDept');

        showToast("Conversation archived successfully!");
        setTimeout(() => { window.location.href = isAdmin ? "adminpage.html" : "memberpage.html"; }, 2000);

    } catch (err) {
        console.error("DEBUGGER - SQL ERROR:", err);
        showToast("Database Error: " + (err.message || "Could not save log"), "error");
        if (submitBtn) { submitBtn.disabled = false; submitBtn.innerHTML = "Confirm & Archive"; }
    }
};

// ── Entry point ───────────────────────────────────────────────────────────────
async function start() {
    await resolveTargetForMember();

    if (!targetEmail) {
        document.getElementById('chatUserName').textContent = "No active chat";
        document.getElementById('chatBox').innerHTML =
            '<div style="padding:30px;text-align:center;color:var(--text-muted);">No admin chat found. Please request a chat from the campus feed.</div>';
        return;
    }

    initChat();
}
start();
</script>

<script>
/* ── Mobile Sidebar Overlay Sync ── */
(function() {
    const overlay = document.getElementById('sidebarOverlay');
    const sidebar = document.getElementById('appSidebar');
    const menuBtn = document.getElementById('mobileMenuBtn');
    const menuIcon = document.getElementById('menuIcon');
    if (!overlay || !sidebar) return;
    const closeSidebar = () => {
        sidebar.classList.remove('open');
        overlay.classList.remove('active');
        if (menuIcon) menuIcon.className = 'ph ph-list';
    };
    overlay.addEventListener('click', closeSidebar);
    if (menuBtn) {
        menuBtn.addEventListener('click', () => {
            setTimeout(() => {
                overlay.classList.toggle('active', sidebar.classList.contains('open'));
            }, 0);
        });
    }
    document.querySelectorAll('#appSidebar .nav-link').forEach(l => {
        l.addEventListener('click', closeSidebar);
    });
})();
</script>
</body>
</html>
