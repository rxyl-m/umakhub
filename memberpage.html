<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMak Hub — Campus Feed</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="umaklogo.png">
</head>
<body class="page page-member" data-page="member">
<div class="app-shell">
<div class="layout">

    <div class="mobile-header">
        <div class="brand-panel" style="margin-bottom:0; padding:0;">
            <img src="umaklogo.png" alt="UMak Hub Logo" id="umaklogo">
            <div>
                <p class="brand-title">UMak Hub</p>
                <span class="brand-subtitle">Social Feed</span>
            </div>
        </div>
        <button class="icon-button" id="mobileMenuBtn" aria-label="Toggle Menu">
            <i class="ph ph-list" id="menuIcon"></i>
        </button>
    </div>

    <aside class="sidebar" id="appSidebar">
        <div class="brand-panel desktop-brand">
            <img src="umaklogo.png" alt="UMak Hub Logo" id="umaklogo">
            <div>
                <p class="brand-title">UMak Hub</p>
                <span class="brand-subtitle">Campus Network</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-link active" data-section="items" href="#">
                <span class="nav-link-icon"><i class="ph ph-browser"></i></span> Campus Feed
                <span id="itemsBadge" class="badge-inline hidden">0</span>
            </a>
            <a class="nav-link" data-section="requests" href="#">
                <span class="nav-link-icon"><i class="ph ph-user-circle"></i></span> My Posts
            </a>
            <a class="nav-link" data-section="conversations" href="#">
                <span class="nav-link-icon"><i class="ph ph-clock-counter-clockwise"></i></span> Chat History
            </a>
            <a class="nav-link hidden" id="activeChatLink" href="messageft.html">
                <span class="nav-link-icon"><i class="ph ph-chat-circle-dots"></i></span> Messages
            </a>
        </nav>
        
        <div class="sidebar-footer">
            <button class="button secondary fullwidth theme-toggle-btn" style="margin-bottom: 12px;">
                <i class="ph ph-moon theme-icon"></i> <span style="margin-left:5px;">Toggle Theme</span>
            </button>
            <div class="profile-card">
                <div class="profile-info">
                    <div class="profile-avatar" id="memberAvatar" style="background: var(--accent); color: var(--iac-navy);">U</div>
                    <div>
                        <p class="profile-name" id="memberName">Loading...</p>
                        <p class="profile-role">Student</p>
                    </div>
                </div>
                <button id="logoutBtn" class="logout-icon-btn" aria-label="Sign Out" title="Sign Out">
                    <i class="ph ph-sign-out"></i>
                </button>
            </div>
        </div>
    </aside>

    <div class="content-area">
        <div id="chatRequestModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" onclick="closeModal(document.getElementById('chatRequestModal'))"></div>
    <div class="modal-panel" style="max-width:400px;">
        <div class="modal-header">
            <div>
                <h2>Request Admin Chat</h2>
                <p>Describe what you need help with.</p>
            </div>
            <button onclick="closeModal(document.getElementById('chatRequestModal'))" class="button secondary sm">
                <i class="ph ph-x"></i>
            </button>
        </div>
        <form id="chatRequestForm">
            <label>
                Reason for chat
                <textarea id="chatReason" rows="3" required placeholder="e.g., I have a question about my project showcase..."></textarea>
            </label>
            <button type="submit" class="button primary fullwidth" style="margin-top:10px;">
                <i class="ph ph-paper-plane"></i> Send Request
            </button>
        </form>
    </div>
</div>
        <p id="memberNotice" class="success-message visually-hidden" aria-live="polite" style="margin:0;border-radius:var(--radius-lg);padding:11px 18px;"></p>

        <div id="section-items" class="admin-section">
            <header class="page-header">
                <div>
                    <p class="section-label">Discover</p>
                    <h1>Campus Feed</h1>
                </div>
                <div class="header-actions">
                    <div class="search-field">
                        <input type="search" id="memberSearch" placeholder="Search posts..." oninput="filterMemberItems()">
                    </div>
                </div>
            </header>

            <div class="panel" style="padding:16px 18px;">
                <span class="section-label-sm">Filter feed</span>
                <div class="cat-filter-row" id="catFilter">
                    <button class="cat-pill active" data-cat="all">All Posts</button>
                    <button class="cat-pill" data-cat="Showcase"><i class="ph ph-star"></i> Project Showcase</button>
                    <button class="cat-pill" data-cat="Question"><i class="ph ph-question"></i> Questions</button>
                    <button class="cat-pill" data-cat="General"><i class="ph ph-chat-text"></i> General</button>
                </div>
            </div>

            <section class="panel">
                <div id="itemsList" class="list-grid"></div>
            </section>
        </div>

        <div id="section-requests" class="admin-section hidden">
            <header class="page-header">
                <div>
                    <p class="section-label">Profile</p>
                    <h1>My Posts</h1>
                </div>
            </header>
            <section class="panel">
                <div id="myRequests" class="list-grid"></div>
            </section>
        </div>

        <div id="section-conversations" class="admin-section hidden">
            <header class="page-header">
                <div>
                    <p class="section-label">Records</p>
                    <h1>My Chat History</h1>
                </div>
            </header>
            <section class="panel">
                <div id="resolutionsList" class="list-grid"></div>
            </section>
        </div>

    </div></div></div>
    
    <div class="fab-container">
    <div class="fab-options" id="fabOptions">
        <a class="fab-option" href="requestform.html" style="background: var(--accent); color: var(--iac-navy);">
            <div class="fab-option-dot" style="background: var(--iac-navy);"></div> Create Post
        </a>
        <a class="fab-option" href="#" onclick="openChatRequestModal(); closeFab();" style="background: var(--iac-bright); color: white;">
            <div class="fab-option-dot" style="background: white;"></div> Message Admin
        </a>
    </div>
    <button class="fab-main" id="fabMain" onclick="toggleFab()">
        <i class="ph ph-plus" style="font-size: 24px;"></i>
    </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="script.js"></script>
</body>
</html>
