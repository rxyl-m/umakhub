<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portfolio — UMak Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="umaklogo.png">
    <style>
        .portfolio-header { text-align: center; padding: 40px 20px; background: var(--bg-surface); border-bottom: 1px solid var(--border); }
        .portfolio-avatar { width: 120px; height: 120px; border-radius: var(--radius-xl); margin: 0 auto 16px; object-fit: cover; box-shadow: var(--shadow-lg); background: var(--iac-blue); display: flex; align-items: center; justify-content: center; color: white; font-size: 3rem; font-family: var(--font-display); font-weight: 800; border: 4px solid var(--bg-base); }
        .portfolio-name { font-family: var(--font-display); font-size: 2.2rem; font-weight: 800; margin-bottom: 8px; }
        .portfolio-meta { color: var(--accent); font-weight: 600; font-family: var(--font-mono); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; }
        .portfolio-bio { max-width: 600px; margin: 0 auto 24px; color: var(--text-secondary); line-height: 1.6; }
        .doc-card { background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; transition: all 0.2s ease; display: flex; flex-direction: column; }
        .doc-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: var(--shadow); }
        .doc-card h3 { margin: 10px 0; font-size: 1.1rem; }
    </style>
</head>
<body class="page">
<div class="app-shell" style="max-width: 1000px;">
    
    <div style="padding: 20px 0;">
        <a href="#" id="backBtn" class="button secondary sm"><i class="ph ph-arrow-left"></i> Back to Directory</a>
    </div>

    <header class="portfolio-header panel" id="portHeader">
        <div style="opacity: 0.5;">Loading Portfolio...</div>
    </header>

    <div style="margin-top: 30px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
            <h2 style="font-family: var(--font-display);">Portfolio & Credentials</h2>
            <div class="filter-tabs" id="docFilters">
                <button class="filter-tab active" data-filter="all">All</button>
                <button class="filter-tab" data-filter="Certificate">Certificates</button>
                <button class="filter-tab" data-filter="Journal">Journals</button>
                <button class="filter-tab" data-filter="Log">Logs</button>
                <button class="filter-tab" data-filter="Diary">Diaries</button>
            </div>
        </div>

        <div id="docsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px;">
            </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="script.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {
    applyTheme();
    const user = getCurrentUser();
    document.getElementById("backBtn").href = (user && user.role === 'admin') ? "adminpage.html" : "memberpage.html";

    const params = new URLSearchParams(window.location.search);
    const targetEmail = params.get('email');
    if (!targetEmail) { document.getElementById("portHeader").innerHTML = "User not specified."; return; }

    try {
        // Fetch User
        const { data: profile } = await supabaseClient.from('users').select('*').eq('email', targetEmail).single();
        if (!profile) throw new Error("User not found");

        // Fetch Documents
        const { data: docs } = await supabaseClient.from('portfolio_documents').select('*').eq('user_email', targetEmail).order('created_at', { ascending: false });

        // Render Header
        let avatarHtml = profile.avatar_url 
            ? `<img src="${esc(profile.avatar_url)}" class="portfolio-avatar" style="background: transparent;">` 
            : `<div class="portfolio-avatar">${esc(profile.name.slice(0,2).toUpperCase())}</div>`;
        
        let linksHtml = `<div style="display:flex; gap:10px; justify-content:center;">`;
        if (profile.resume_url) linksHtml += `<a href="${esc(profile.resume_url)}" target="_blank" class="button primary"><i class="ph ph-file-pdf"></i> View Resume</a>`;
        if (profile.github_url) linksHtml += `<a href="${esc(profile.github_url)}" target="_blank" class="button outline"><i class="ph ph-link"></i> Profile Link</a>`;
        linksHtml += `</div>`;

        document.getElementById("portHeader").innerHTML = `
            ${avatarHtml}
            <h1 class="portfolio-name">${esc(profile.name)}</h1>
            <div class="portfolio-meta">${esc(profile.course_strand || 'Student')} &nbsp;·&nbsp; ${esc(profile.grade_section || 'UMak')}</div>
            <p class="portfolio-bio">${esc(profile.bio || 'This student has not written a bio yet.')}</p>
            ${linksHtml}
        `;

        // Render Documents
        const renderDocs = (filter) => {
            const grid = document.getElementById("docsGrid");
            const filtered = (filter === "all") ? docs : docs.filter(d => d.document_type === filter);
            
            if (!filtered || filtered.length === 0) {
                grid.innerHTML = `<div class="empty-state" style="grid-column: 1 / -1;">No documents found in this category.</div>`;
                return;
            }

            grid.innerHTML = filtered.map(d => `
                <div class="doc-card">
                    <span class="tag" style="width: fit-content;"><i class="ph ph-file-text"></i> ${esc(d.document_type)}</span>
                    <h3>${esc(d.title)}</h3>
                    <div style="margin-top: auto; padding-top: 15px;">
                        <a href="${esc(d.file_url)}" target="_blank" class="button secondary fullwidth">View Document</a>
                    </div>
                </div>
            `).join("");
        };

        renderDocs("all");

        // Filter Logic
        document.querySelectorAll("#docFilters .filter-tab").forEach(tab => {
            tab.addEventListener("click", () => {
                document.querySelectorAll("#docFilters .filter-tab").forEach(t => t.classList.remove("active"));
                tab.classList.add("active");
                renderDocs(tab.dataset.filter);
            });
        });

    } catch (err) {
        console.error(err);
        document.getElementById("portHeader").innerHTML = "Error loading portfolio.";
    }
});
</script>
</body>
</html>
